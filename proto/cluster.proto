syntax = "proto3";

package notifier.cluster.v1;

option go_package = "github.com/tursom/turntf/internal/proto;proto";

message Envelope {
  int64 node_id = 1;
  uint64 sequence = 2;
  string sent_at_hlc = 3;
  oneof body {
    Hello hello = 4;
    Ack ack = 5;
    EventBatch event_batch = 6;
    PullEvents pull_events = 7;
    SnapshotDigest snapshot_digest = 8;
    SnapshotChunk snapshot_chunk = 9;
    TimeSyncRequest time_sync_request = 10;
    TimeSyncResponse time_sync_response = 11;
    MembershipUpdate membership_update = 17;
  }
  bytes hmac = 12;
}

message Hello {
  int64 node_id = 1;
  string advertise_addr = 2;
  string protocol_version = 3;
  repeated OriginProgress origin_progress = 4;
  string snapshot_version = 5;
  uint32 message_window_size = 6;
  uint64 connection_id = 8;
  uint32 smoothed_rtt_ms = 9;
  uint32 jitter_penalty_ms = 10;
  bool supports_membership = 11;
  uint64 runtime_epoch = 12;
}

message OriginProgress {
  int64 origin_node_id = 1;
  uint64 last_event_id = 2;
}

message Ack {
  int64 node_id = 1;
  int64 origin_node_id = 2;
  uint64 acked_event_id = 3;
}

message EventBatch {
  repeated ReplicatedEvent events = 1;
  uint64 pull_request_id = 2;
  int64 origin_node_id = 3;
  uint64 truncated_before_event_id = 4;
}

message ReplicatedEvent {
  int64 event_id = 1;
  string aggregate_type = 2;
  int64 aggregate_node_id = 3;
  int64 aggregate_id = 4;
  string hlc = 5;
  int64 origin_node_id = 6;
  oneof body {
    UserCreatedEvent user_created = 7;
    UserUpdatedEvent user_updated = 8;
    UserDeletedEvent user_deleted = 9;
    MessageCreatedEvent message_created = 10;
    UserAttachmentUpsertedEvent user_attachment_upserted = 11;
    UserAttachmentDeletedEvent user_attachment_deleted = 12;
  }
}

message UserCreatedEvent {
  int64 node_id = 1;
  int64 user_id = 2;
  string username = 3;
  string password_hash = 4;
  string profile = 5;
  string role = 6;
  bool system_reserved = 7;
  string created_at_hlc = 8;
  string updated_at_hlc = 9;
  string version_username = 10;
  string version_password_hash = 11;
  string version_profile = 12;
  string version_role = 13;
  int64 origin_node_id = 14;
}

message UserUpdatedEvent {
  int64 node_id = 1;
  int64 user_id = 2;
  string username = 3;
  string password_hash = 4;
  string profile = 5;
  string role = 6;
  bool system_reserved = 7;
  string created_at_hlc = 8;
  string updated_at_hlc = 9;
  string deleted_at_hlc = 10;
  string version_username = 11;
  string version_password_hash = 12;
  string version_profile = 13;
  string version_role = 14;
  string version_deleted = 15;
  int64 origin_node_id = 16;
}

message UserDeletedEvent {
  int64 node_id = 1;
  int64 user_id = 2;
  string deleted_at_hlc = 3;
}

message ClusterUserRef {
  int64 node_id = 1;
  int64 user_id = 2;
}

message MessageCreatedEvent {
  ClusterUserRef recipient = 1;
  int64 node_id = 3;
  int64 seq = 4;
  ClusterUserRef sender = 5;
  bytes body = 6;
  string created_at_hlc = 8;
}

message UserAttachmentUpsertedEvent {
  ClusterUserRef owner = 1;
  ClusterUserRef subject = 2;
  string attachment_type = 3;
  string config_json = 4;
  string attached_at_hlc = 5;
  int64 origin_node_id = 6;
}

message UserAttachmentDeletedEvent {
  ClusterUserRef owner = 1;
  ClusterUserRef subject = 2;
  string attachment_type = 3;
  string config_json = 4;
  string attached_at_hlc = 5;
  string deleted_at_hlc = 6;
  int64 origin_node_id = 7;
}

message PullEvents {
  int64 origin_node_id = 1;
  uint64 after_event_id = 2;
  uint32 limit = 3;
  uint64 request_id = 4;
}

message SnapshotDigest {
  string snapshot_version = 1;
  repeated SnapshotPartitionDigest partitions = 2;
}

message SnapshotChunk {
  string partition = 1;
  repeated SnapshotRow rows = 2;
  string snapshot_version = 3;
  SnapshotPartitionKind kind = 4;
  bool request = 5;
}

enum SnapshotPartitionKind {
  SNAPSHOT_PARTITION_KIND_UNSPECIFIED = 0;
  SNAPSHOT_PARTITION_KIND_USERS = 1;
  SNAPSHOT_PARTITION_KIND_MESSAGES = 2;
  SNAPSHOT_PARTITION_KIND_ATTACHMENTS = 3;
}

message SnapshotPartitionDigest {
  string partition = 1;
  SnapshotPartitionKind kind = 2;
  uint64 row_count = 3;
  bytes hash = 4;
}

message SnapshotRow {
  oneof body {
    SnapshotUserRow user = 1;
    SnapshotTombstoneRow tombstone = 2;
    SnapshotMessageRow message = 3;
    SnapshotAttachmentRow attachment = 4;
  }
}

message SnapshotUserRow {
  int64 user_id = 1;
  int64 node_id = 16;
  string username = 2;
  string password_hash = 3;
  string profile = 4;
  string role = 13;
  bool system_reserved = 14;
  string created_at_hlc = 5;
  string updated_at_hlc = 6;
  string deleted_at_hlc = 7;
  string version_username = 8;
  string version_password_hash = 9;
  string version_profile = 10;
  string version_role = 15;
  string version_deleted = 11;
  int64 origin_node_id = 12;
}

message SnapshotTombstoneRow {
  string entity_type = 1;
  int64 entity_id = 2;
  string deleted_at_hlc = 3;
  int64 origin_node_id = 4;
  int64 entity_node_id = 5;
}

message SnapshotMessageRow {
  ClusterUserRef recipient = 1;
  int64 node_id = 2;
  ClusterUserRef sender = 3;
  bytes body = 4;
  string created_at_hlc = 6;
  int64 seq = 7;
}

message SnapshotAttachmentRow {
  ClusterUserRef owner = 1;
  ClusterUserRef subject = 2;
  string attachment_type = 3;
  string config_json = 4;
  string attached_at_hlc = 5;
  string deleted_at_hlc = 6;
  int64 origin_node_id = 7;
}

message TimeSyncRequest {
  uint64 request_id = 1;
  int64 client_send_time_ms = 2;
}

message TimeSyncResponse {
  uint64 request_id = 1;
  int64 client_send_time_ms = 2;
  int64 server_receive_time_ms = 3;
  int64 server_send_time_ms = 4;
}

message QueryLoggedInUsersRequest {
  uint64 request_id = 1;
  int64 target_node_id = 2;
  int64 origin_node_id = 3;
  int32 remaining_hops = 4;
}

message QueryLoggedInUsersResponse {
  uint64 request_id = 1;
  int64 target_node_id = 2;
  repeated ClusterLoggedInUser items = 3;
  string error_code = 4;
  string error_message = 5;
  int64 origin_node_id = 6;
  int32 remaining_hops = 7;
}

message QueryResolveUserSessionsRequest {
  uint64 request_id = 1;
  int64 target_node_id = 2;
  int64 origin_node_id = 3;
  int32 remaining_hops = 4;
  ClusterUserRef user = 5;
}

message QueryResolveUserSessionsResponse {
  uint64 request_id = 1;
  int64 target_node_id = 2;
  repeated ClusterSessionRef items = 3;
  string error_code = 4;
  string error_message = 5;
  int64 origin_node_id = 6;
  int32 remaining_hops = 7;
  ClusterUserRef user = 8;
}

message ClusterLoggedInUser {
  int64 node_id = 1;
  int64 user_id = 2;
  string username = 3;
}

message ClusterSessionRef {
  int64 serving_node_id = 1;
  string session_id = 2;
  string transport = 3;
  bool transient_capable = 4;
}

message ClusterOnlineNodePresence {
  ClusterUserRef user = 1;
  int64 serving_node_id = 2;
  int32 session_count = 3;
  string transport_hint = 4;
}

message OnlinePresenceSnapshot {
  int64 origin_node_id = 1;
  uint64 generation = 2;
  repeated ClusterOnlineNodePresence items = 3;
  uint64 runtime_epoch = 4;
  repeated ClusterLoggedInUser logged_in_users = 5;
}

message NodeConnectivityRumor {
  int64 target_node_id = 1;
  uint64 target_runtime_epoch = 2;
  int64 reporter_node_id = 3;
  uint64 reporter_runtime_epoch = 4;
  int64 observed_at_ms = 5;
  string reason = 6;
}

message MembershipUpdate {
  int64 origin_node_id = 1;
  uint64 generation = 2;
  repeated PeerAdvertisement peers = 3;
}

message PeerAdvertisement {
  int64 node_id = 1;
  string url = 2;
  uint64 generation = 3;
  int64 observed_at_unix_ms = 4;
  string zeromq_curve_server_public_key = 5;
}

message TransientPacket {
  uint64 packet_id = 1;
  int64 source_node_id = 2;
  int64 target_node_id = 3;
  ClusterUserRef recipient = 4;
  ClusterUserRef sender = 6;
  bytes body = 7;
  ClusterDeliveryMode delivery_mode = 8;
  uint32 ttl_hops = 9;
  ClusterSessionRef target_session = 10;
}

enum ClusterDeliveryMode {
  CLUSTER_DELIVERY_MODE_UNSPECIFIED = 0;
  CLUSTER_DELIVERY_MODE_BEST_EFFORT = 1;
  CLUSTER_DELIVERY_MODE_ROUTE_RETRY = 2;
}
