name: verify

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOCACHE: ${{ runner.temp }}/go-build-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build smoke binary
        run: go build -trimpath -o "${RUNNER_TEMP}/turntf" ./cmd/turntf

      - name: Run smoke flow
        run: ./scripts/smoke.sh "${RUNNER_TEMP}/turntf"
